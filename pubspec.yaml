  http: ^1.6.0
  markdown: ^7.3.1
  share_plus: ^12.0.1
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  build_runner: ^2.12.2
  injectable_generator: ^2.12.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
