name: docguard
description: "A secure document management system."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_doc_scanner: ^0.0.18
  google_fonts: ^8.0.2
  google_mlkit_document_scanner: ^0.4.1
  powersync_core: ^1.8.0
  bloc_test: ^10.0.0
  change_app_package_name: ^1.5.0
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  injectable: ^2.7.1+4
  pinput: ^6.0.2
  shared_preferences: ^2.5.4
  supabase: ^2.10.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  supabase_flutter: ^2.12.0
  flutter_svg: ^2.2.4
  powersync: ^1.18.0
  logging: ^1.3.0
  uuid: ^4.5.3
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf_image_renderer: ^1.0.1
  intl: ^0.20.2
  syncfusion_flutter_pdfviewer: ^33.1.44
